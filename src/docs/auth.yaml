openapi: 3.0.0
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Daftar akun baru
      description: |
        Membuat akun pengguna baru di sistem EcoRoute.
        
        **Role yang tersedia:**
        - `public` — Pengguna umum/warga (default)
        - `officer` — Petugas kebersihan
        - `admin` — Administrator sistem
        
        Password akan di-*hash* menggunakan bcrypt sebelum disimpan.
        **Tidak ada token yang dikembalikan** — user perlu login setelah registrasi.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              pengguna_umum:
                summary: Registrasi pengguna umum
                value:
                  name: Budi Santoso
                  email: budi@example.com
                  password: rahasia123
                  role: public
              petugas:
                summary: Registrasi petugas kebersihan
                value:
                  name: Dewi Rahayu
                  email: dewi.petugas@ecoroute.com
                  password: petugas456
                  role: officer
      responses:
        '201':
          description: Registrasi berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                message: Registrasi berhasil
                user:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: Budi Santoso
                  email: budi@example.com
                  role: public
                  work_area: null
                  fcm_token: null
                  created_at: '2026-05-18T10:00:00.000Z'
        '400':
          description: Validasi gagal (field wajib kosong / format salah)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: '"email" must be a valid email'
        '409':
          description: Email sudah terdaftar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Email sudah terdaftar
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login akun
      description: |
        Autentikasi pengguna dengan email dan password.
        
        Mengembalikan:
        - **`access_token`** — JWT berlaku **15 menit**, digunakan di header `Authorization: Bearer <token>`
        - **`refresh_token`** — JWT berlaku **7 hari**, digunakan untuk mendapatkan access token baru
        - **`user`** — Data profil pengguna (tanpa password)
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                summary: Login sebagai admin
                value:
                  email: admin@ecoroute.com
                  password: password123
              pengguna:
                summary: Login sebagai pengguna umum
                value:
                  email: budi@example.com
                  password: rahasia123
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c2VyXzEyMyIsInJvbGUiOiJwdWJsaWMiLCJpYXQiOjE3MTYwMDAwMDAsImV4cCI6MTcxNjAwMDkwMH0.xxx
                refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c2VyXzEyMyIsImlhdCI6MTcxNjAwMDAwMCwiZXhwIjoxNzE2NjA0ODAwfQ.yyy
                user:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: Budi Santoso
                  email: budi@example.com
                  role: public
                  work_area: null
                  fcm_token: null
                  created_at: '2026-05-18T10:00:00.000Z'
        '400':
          description: Request body tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Email atau kata sandi salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Email atau kata sandi salah
        '429':
          description: Terlalu banyak request (rate limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Too many requests, please try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Perbarui access token
      description: |
        Gunakan **refresh_token** yang diperoleh dari endpoint login untuk mendapatkan
        **access_token** baru tanpa perlu login ulang.
        
        Refresh token berlaku selama **7 hari**. Jika sudah kedaluwarsa, user harus login kembali.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.xxx.yyy
      responses:
        '200':
          description: Access token baru berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.bbb.ccc
        '401':
          description: Refresh token tidak valid atau sudah kedaluwarsa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Refresh token tidak valid atau sudah kedaluwarsa
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Auth
      summary: Profil pengguna yang sedang login
      description: |
        Mengembalikan data profil pengguna berdasarkan JWT access token yang dikirimkan
        di header `Authorization`.
        
        **Membutuhkan autentikasi JWT.**
      operationId: getMyProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Data profil berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
              example:
                user:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: Budi Santoso
                  email: budi@example.com
                  role: public
                  work_area: null
                  fcm_token: null
                  created_at: '2026-05-18T10:00:00.000Z'
        '401':
          description: Token tidak diberikan atau tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing:
                  summary: Header Authorization tidak ada
                  value:
                    error: Missing Authorization header
                invalid:
                  summary: Token tidak valid
                  value:
                    error: Invalid token
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
