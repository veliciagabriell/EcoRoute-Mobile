openapi: 3.0.0
paths:
  /reports:
    post:
      tags:
        - Reports
      summary: Buat laporan warga
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
              properties:
                tps_id:
                  type: string
                  format: uuid
                description:
                  type: string
                indicators:
                  type: array
                  items:
                    type: string
                severity:
                  type: string
                  enum: [rendah, sedang, tinggi]
                photo_base64:
                  type: string
                  description: Base64 image string
                photo_mime:
                  type: string
                  example: image/jpeg
                location_lat:
                  type: number
                location_lng:
                  type: number
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Laporan berhasil dibuat
        '401':
          description: Unauthorized
    get:
      tags:
        - Reports
      summary: Daftar laporan (admin)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Laporan berhasil diambil
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /reports/{id}:
    patch:
      tags:
        - Reports
      summary: Update status laporan (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Laporan berhasil diupdate
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
