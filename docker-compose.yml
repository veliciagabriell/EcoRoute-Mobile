version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ecouser
      POSTGRES_PASSWORD: ecopass
      POSTGRES_DB: ecoroute
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - '1883:1883'

volumes:
  pgdata:
